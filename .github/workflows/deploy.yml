name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # Job 1: Code Quality & Testing
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Setup ESLint (if needed)
        run: |
          if [ ! -f .eslintrc.json ]; then
            echo '{"extends": "next/core-web-vitals"}' > .eslintrc.json
          fi

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🏗️ Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: .next/
          retention-days: 1

  # Job 2: Deploy to EC2
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: 📤 Deploy to EC2
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
        run: |
          # Copy files to EC2
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.next' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ $SSH_USER@$SSH_HOST:/var/www/nextjs-app/

          # Execute deployment script on EC2
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
            cd /var/www/nextjs-app
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          EOF

      - name: 🏥 Health Check
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh $APP_URL

      - name: ✅ Deployment Status
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Application URL: ${{ secrets.APP_URL }}"
          echo "📅 Deployed at: $(date)"

  # Job 3: Notify on Failure
  notify-failure:
    name: Notify on Failure
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: ❌ Deployment Failed
        run: |
          echo "Deployment failed! Check the logs above."
          exit 1
